name: Build SwayFX 0.5.3 (Static)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build & Package SwayFX (Static)
    runs-on: ubuntu-latest
    container:
      image: debian:trixie

    steps:
      - name: Install Dependencies
        run: |
          apt-get update && apt-get install -y \
            meson pkg-config cmake git scdoc \
            wayland-protocols \
            libwayland-dev libpcre2-dev libjson-c-dev \
            libpango1.0-dev libcairo2-dev libgdk-pixbuf-2.0-dev \
            libdrm-dev libgbm-dev libinput-dev libseat-dev libxkbcommon-dev \
            libxcb-dri3-dev libxcb-present-dev libxcb-res0-dev \
            libxcb-render-util0-dev libxcb-ewmh-dev libxcb-icccm4-dev \
            libliftoff-dev libdisplay-info-dev liblcms2-dev libpixman-1-dev \
            libgles2-mesa-dev \
            libglib2.0-dev libfontconfig-dev libfreetype-dev \
            libexpat1-dev libfribidi-dev libharfbuzz-dev \
            libthai-dev libdatrie-dev libxrender-dev \
            libpng-dev zlib1g-dev libsystemd-dev \
            libudev-dev libmtdev-dev libevdev-dev libgudev-1.0-dev \
            libxcb-xfixes0-dev libxcb-xinput-dev \
            libxcb1-dev libxau-dev libxdmcp-dev

      - name: Clone SwayFX 0.5.3
        run: |
          git clone https://github.com/WillPower3309/swayfx.git
          cd swayfx
          git checkout 0.5.3

      - name: Setup Subprojects
        run: |
          mkdir -p swayfx/subprojects
          cd swayfx/subprojects

          git clone https://github.com/wlrfx/scenefx.git
          cd scenefx && git checkout 0.4.1 && cd ..

          git clone https://gitlab.freedesktop.org/wlroots/wlroots.git
          cd wlroots && git checkout 0.19.0 && cd ..

      - name: Configure Build (Meson — Static subprojects)
        run: |
          cd swayfx
          meson setup build/ \
            --prefix=/usr/local \
            --wrap-mode=nofallback \
            -Db_lto=true \
            -Db_pie=true \
            -Dtray=disabled \
            -Dman-pages=disabled \
            -Dwlroots:default_library=static \
            -Dscenefx:default_library=static

      - name: Compile
        run: |
          cd swayfx
          ninja -C build/

      - name: Install to Staging Directory
        run: |
          cd swayfx
          DESTDIR=$GITHUB_WORKSPACE/staging ninja -C build/ install

      - name: Package Artifact
        run: |
          cd $GITHUB_WORKSPACE/staging
          tar -czf ../swayfx-0.5.3-debian-trixie-x86_64-static.tar.gz .

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: swayfx-0.5.3-debian-trixie-static
          path: swayfx-0.5.3-debian-trixie-x86_64-static.tar.gz

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: swayfx-0.5.3-debian-trixie-static

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: swayfx-0.5.3-${{ github.run_number }}
          name: SwayFX 0.5.3 — Static Build ${{ github.run_number }}
          body: |
            Automated build of **SwayFX 0.5.3** on Debian 13 (Trixie).

            **Built with:**
            - wlroots 0.19.0 (statically linked)
            - scenefx 0.4.1 (statically linked)
            - LTO + PIE enabled
            - Tray: disabled
            - Man pages: disabled

            **Triggered by:** `${{ github.sha }}`

            > ⚠️ `libwayland-client`, `libwayland-server`, and `libglesv2` remain
            > as runtime deps — they cannot be statically linked in a Wayland compositor.

            Install by extracting the tarball to `/`:
            ```bash
            sudo tar -xzf swayfx-0.5.3-debian-trixie-x86_64-static.tar.gz -C /
            sudo ldconfig
            ```
          files: swayfx-0.5.3-debian-trixie-x86_64-static.tar.gz
          make_latest: true
