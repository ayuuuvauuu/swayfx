name: Build SwayFX (Debian Trixie)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    container:
      image: debian:sid

    steps:
      - name: Install dependencies
        run: |
          apt update
          DEBIAN_FRONTEND=noninteractive apt install -y \
            meson pkg-config cmake git scdoc ninja-build build-essential \
            wayland-protocols libwayland-dev libpcre2-dev libjson-c-dev \
            libpango1.0-dev libcairo2-dev libgdk-pixbuf-2.0-dev \
            libdrm-dev libgbm-dev libinput-dev libseat-dev libxkbcommon-dev \
            libxcb-dri3-dev libxcb-present-dev libxcb-res0-dev \
            libxcb-render-util0-dev libxcb-ewmh-dev libxcb-icccm4-dev \
            libliftoff-dev libdisplay-info-dev liblcms2-dev libpixman-1-dev \
            libgles2-mesa-dev libegl-dev libgl-dev \
            ca-certificates

      - name: Clone sources
        run: |
          mkdir -p /build
          cd /build

          git clone https://github.com/WillPower3309/swayfx.git
          cd swayfx
          git checkout 0.5.3

          mkdir -p subprojects
          cd subprojects

          git clone https://github.com/wlrfx/scenefx.git
          cd scenefx && git checkout 0.4.1 && cd ..

          git clone https://gitlab.freedesktop.org/wlroots/wlroots.git
          cd wlroots && git checkout 0.19.0

      - name: Configure (clean)
        run: |
          cd /build/swayfx
          rm -rf build
          meson setup build/ --wipe

      - name: Build (verbose)
        run: |
          cd /build/swayfx
          ninja -C build/ -v

      - name: Install (staging)
        run: |
          cd /build/swayfx
          DESTDIR=/build/install ninja -C build/ install

      - name: Package artifact
        run: |
          cd /build/install
          tar -czf swayfx-0.5.3.tar.gz .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: swayfx-0.5.3
          path: /build/install/swayfx-0.5.3.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: swayfx-0.5.3

      - name: Generate tag
        id: tag
        run: echo "tag=auto-$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_OUTPUT

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: SwayFX Build ${{ steps.tag.outputs.tag }}
          files: swayfx-0.5.3.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
