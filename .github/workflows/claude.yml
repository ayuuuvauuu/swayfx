This is a clean, well-structured installation guide. A few things I noticed:

Potential issues to flag:

Missing XWayland deps — if users want XWayland support (running X11 apps under Sway), they'll need libxcb-composite0-dev, libxcb-render0-dev, and xwayland itself. Many users will hit build errors without these.
libgles2-mesa-dev is transitional on Trixie — it may pull in the right thing, but libgl-dev or libgles-dev are the canonical packages now. Worth a note.
Meson subproject wraps vs. manual clones — Meson's native subproject system expects either a .wrap file in subprojects/ or the directory to match the wrap name exactly. Manually cloning works, but the directory names need to match what meson.build expects (e.g., wlroots and scenefx). If SwayFX's meson.build uses wrap fallbacks, the directory names matter. Worth verifying against the actual subprojects/ definitions in the repo.
sudo ninja -C build/ install — installs to /usr/local by default. If users want a different prefix (e.g., /usr), they need meson setup build/ --prefix=/usr. Could be worth mentioning.
No session entry — after installation, users will likely want a .desktop file for their display manager. SwayFX should install one, but calling it out explicitly in the Finalization step would help beginners.
Minor style nit:

The "Return to source root" comment does cd ../.. but the reader has navigated into subprojects/wlroots — so cd ../.. lands back at swayfx/, which is correct. It's fine, just slightly easy to lose track of. A cleaner alternative is using an absolute path like cd ~/build/swayfx to make it unambiguous.

Overall the guide is solid — the subproject approach is the right call over trying to match system library versions.

