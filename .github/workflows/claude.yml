A few things worth knowing about this workflow:

What it does: Runs inside a debian:trixie container on GitHub's ubuntu-latest runner, mirrors every step from your guide, and verifies with sway --version at the end.

Triggers: Fires on push/PR to main, plus workflow_dispatch so you can trigger it manually from the Actions tab.

One caveat: The sway --version verification step may fail in CI because Sway tries to connect to a Wayland/DRM display. You can either remove that step, or replace it with a binary existence check like:

yaml
- name: Verify Installation
  run: |
    test -f /usr/local/bin/sway && echo "sway binary found" || exit 1
    sway --version || echo "Binary exists but display check skipped in CI"
To use it, drop the file into .github/workflows/build-swayfx.yml in your repo.

