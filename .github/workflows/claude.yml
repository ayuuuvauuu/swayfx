Key changes for static linking:

--default-library=static — tells Meson to build all subproject libraries (wlroots, scenefx) as .a static archives instead of .so shared objects.

--wrap-mode=forcefallback — forces Meson to use the subproject source code rather than any system-installed shared libraries, ensuring wlroots and scenefx are actually compiled in, not dynamically linked.

-Db_lto=true — link-time optimization, gives the linker a chance to strip dead code across the static boundaries, reducing binary size.

-Db_pie=true — position-independent executable, good security practice for a static binary.

Extra dev deps added — static linking requires the full transitive dependency chain at compile time: fontconfig, freetype, harfbuzz, fribidi, pango's full stack, evdev, gudev, etc. These would normally be pulled in at runtime by the dynamic linker but now need to be present at build time.

One honest caveat (noted in the release body): libwayland-client and libwayland-server are practically impossible to fully statically link in a Wayland compositor — they communicate over Unix sockets and the protocol dispatch tables are runtime-loaded. Everything else will be static, but those two will still be runtime deps.

