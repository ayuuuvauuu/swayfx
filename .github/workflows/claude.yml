One-line fix: git checkout 0.4.1 → git checkout 0.3.

The original guide was wrong about the scenefx version. scenefx-0.4 in meson.build is the pkg-config ABI name — it doesn't correspond to release tag 0.4.1. The actual release swayfx 0.5.3 was cut against is scenefx 0.3, which is when wlr_scene_blur, corner_radii_all, and all the other APIs the compiler was complaining about were introduced. scenefx 0.4.x came later and is for a future swayfx version.

